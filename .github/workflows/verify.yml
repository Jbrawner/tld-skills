name: Verify

on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify shared block alignment
        run: python3 scripts/verify-block-alignment.py

      - name: Build plugin
        run: bash scripts/build-plugin.sh

      - name: Verify plugin manifest
        run: python3 scripts/verify-build-plugin.py
